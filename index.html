<!DOCTYPE html>
<html>
<head>
  <title>Rekrutmen Myron FC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Open Seleksi Pemain Manchester United</h2>
    <form>

      <label>Nama Lengkap</label>
      <input type="text" placeholder="Masukkan nama" required>

      <label>Umur</label>
      <input type="number" placeholder="Masukkan umur" min="10" max="40" required>

<div class="form-group">
  <label>Posisi Bermain</label>
  <select required>
    <option value="">-- Pilih Posisi --</option>
    <option>Goalkeeper</option>
    <option>Defender</option>
    <option>Midfielder</option>
    <option>Forward</option>
  </select>
</div>

<div class="form-group">
  <label>Kaki Dominan</label>
  <select required>
    <option value="">-- Pilih --</option>
    <option>Kanan</option>
    <option>Kiri</option>
    <option>Keduanya</option>
  </select>
</div>

<div class="form-group">
  <label>Link Google Drive CV / Highlight Video</label>
  <input 
    type="url" 
    placeholder="https://drive.google.com/..." 
    required>
</div>

<div class="form-group">
  <label>Nomor Handphone</label>
  <input type="tel" placeholder="08xxxxxxxxxx" required>
</div>

      <button type="submit">Daftar</button>
    </form>
  </div>
